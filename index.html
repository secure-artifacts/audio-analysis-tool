    function handleAnnoClick(e, getJobId) {
      const tr = e.target.closest("tr");
      if (!tr) return;
      const jobId = getJobId ? getJobId() : (currentJobId || tr.closest("[data-job]")?.dataset.job);
      const paraId = tr.dataset.paraId;
      if (!jobId || !paraId) return;

      const dot = e.target.closest(".at-dot");
      if (dot) {
        const color = dot.dataset.ac;
        const dots = tr.querySelectorAll(".at-dot");
        const wasOn = dot.classList.contains("on");
        dots.forEach(d => d.classList.remove("on"));
        tr.classList.remove("anno-green", "anno-red");
        if (!wasOn) {
          dot.classList.add("on");
          if (color === "green") tr.classList.add("anno-green");
          if (color === "red") tr.classList.add("anno-red");
          setAnnot(jobId, paraId, { color: color === "white" ? "" : color });
          tr.dataset.color = color === "white" ? "" : color;
        } else {
          setAnnot(jobId, paraId, { color: "" });
          tr.dataset.color = "";
        }
        const selected = reviewHistoryList.querySelector(".history-item.selected");
        if (selected) updateReviewSummary(selected.dataset.id, Array.from(reviewResultBody.querySelectorAll("tr")).map(row => ({ id: row.dataset.paraId })));
        applyReviewFilter();
        return;
      }

      const noteBtn = e.target.closest(".at-note");
      if (noteBtn) {
        e.stopPropagation();
        if (getJobId) {
          showAnnotationPanel(jobId, paraId, tr);
          return;
        }
        if (activePopup) { activePopup.classList.remove("show"); activePopup = null; }
        const rect = noteBtn.getBoundingClientRect();
        const popup = document.createElement("div");
        popup.className = "anno-popup show";
        popup.dataset.paraId = paraId;
        popup.dataset.jobId = jobId;
        const a = getAnnot(jobId, paraId);
        popup.innerHTML = `
          <div class="popup-header"><span>备注</span><button class="popup-close" type="button">✕</button></div>
          <textarea placeholder="输入备注...">${escapeHtml(a.note || "")}</textarea>

          const hasValue = !!this.value.trim();
          setAnnot(jobId, paraId, { note: this.value.trim() });

          if (noteBtn.classList.contains("note-indicator")) noteBtn.hidden = !hasValue;
        });
        popup.querySelector(".popup-close").addEventListener("click", () => {
          popup.classList.remove("show"); activePopup = null;
        });
	        popup.style.left = Math.min(rect.left, window.innerWidth - 340) + "px";
	        // 防底部超出视口

    function cellText(row, field) {
      return (row.querySelector(`td.${field} .celltext`)?.textContent || "").trim();
    }

    function rowCopyText(row, mode) {
      const fr = cellText(row, "fr");
      const zh = cellText(row, "zh");
      if (mode === "fr") return fr;
      if (mode === "zh") return zh;
      return [fr, zh].filter(Boolean).join("\n");
    }

    function selectedCopyText(tbody) {
      return Array.from(tbody.querySelectorAll("tr")).map(row => {
        const fields = ["fr", "zh"].filter(field => row.querySelector(`td.${field}.copy-selected`));
        return fields.map(field => cellText(row, field)).filter(Boolean).join("\n");
      }).filter(Boolean).join("\n\n");
    }

    function tableCopyText(tbody, mode) {
      if (mode === "selected") return selectedCopyText(tbody);
      return Array.from(tbody.querySelectorAll("tr")).map(row => rowCopyText(row, mode)).filter(Boolean).join("\n\n");
    }

    async function copyText(text) {
      if (!text.trim()) throw new Error("nothing to copy");
      if (navigator.clipboard?.writeText) {
        await navigator.clipboard.writeText(text);
        return;
      }
      const ta = document.createElement("textarea");
      ta.value = text;
      ta.style.position = "fixed";
      ta.style.opacity = "0";
      document.body.appendChild(ta);
      ta.select();
      document.execCommand("copy");
      ta.remove();
    }

    document.querySelectorAll(".copy-tools").forEach(tools => {
      tools.addEventListener("click", async (e) => {
        const tbody = document.getElementById(tools.dataset.copyTable);
        if (!tbody) return;
        const selectBtn = e.target.closest("[data-select-mode]");
        if (selectBtn) {
          tbody.dataset.copySelect = tbody.dataset.copySelect === "1" ? "0" : "1";
          selectBtn.classList.toggle("active", tbody.dataset.copySelect === "1");
          if (tbody.dataset.copySelect !== "1") tbody.querySelectorAll(".copy-selected").forEach(td => td.classList.remove("copy-selected"));
          return;
        }
        const btn = e.target.closest("[data-copy]");
        if (!btn) return;
        try {
          await copyText(tableCopyText(tbody, btn.dataset.copy));
          const old = btn.textContent;
          btn.textContent = "已复制";
          setTimeout(() => { btn.textContent = old; }, 900);
        } catch {
          await showAlert("没有可复制的内容");
        }
      });
    });

    let copyDrag = null;
    function copyCell(target) {
      return target.closest("td.fr, td.zh");
    }
    function copyField(td) {
      return td?.classList.contains("fr") ? "fr" : td?.classList.contains("zh") ? "zh" : "";
    }
    function selectCopyRange(tbody, a, b) {
      const rows = Array.from(tbody.querySelectorAll("tr"));
      const fields = ["fr", "zh"];
      const aRow = rows.indexOf(a.closest("tr"));
      const bRow = rows.indexOf(b.closest("tr"));
      const aField = fields.indexOf(copyField(a));
      const bField = fields.indexOf(copyField(b));
      if (aRow < 0 || bRow < 0 || aField < 0 || bField < 0) return;
      const [r1, r2] = [Math.min(aRow, bRow), Math.max(aRow, bRow)];
      const [f1, f2] = [Math.min(aField, bField), Math.max(aField, bField)];
      tbody.querySelectorAll(".copy-selected").forEach(td => td.classList.remove("copy-selected"));
      rows.slice(r1, r2 + 1).forEach(row => {
        fields.slice(f1, f2 + 1).forEach(field => row.querySelector(`td.${field}`)?.classList.add("copy-selected"));
      });
    }
    document.addEventListener("mousedown", (e) => {
      const td = copyCell(e.target);
      const tbody = td?.closest("tbody");
      if (!td || tbody?.dataset.copySelect !== "1") return;
      e.preventDefault();
      copyDrag = { tbody, start: td };
      selectCopyRange(tbody, td, td);
    });
    document.addEventListener("mouseover", (e) => {
      if (!copyDrag) return;
      const td = copyCell(e.target);
      if (td && td.closest("tbody") === copyDrag.tbody) selectCopyRange(copyDrag.tbody, copyDrag.start, td);
    });
    document.addEventListener("mouseup", () => { copyDrag = null; });

	      });
	      tableBody.querySelectorAll("tr.current-playing").forEach(tr => tr.classList.remove("current-playing"));

	    }

		                          <span class="at-dot g ${a.color === 'green' ? 'on' : ''}" data-ac="green" title="好的点"></span>
		                          <span class="at-dot w ${!a.color || a.color === 'white' ? 'on' : ''}" data-ac="white" title="默认"></span>
		                          <span class="at-dot r ${a.color === 'red' ? 'on' : ''}" data-ac="red" title="有问题"></span>
		                          <button class="at-note ${hasNote}" data-anote title="${escapeHtml(a.note || "备注")}" type="button">${a.note ? "注*" : "注"}</button>
		                        </span>
		                      </div>
		                    </td>
		                    <td class="speaker" data-label="说话人"><select data-field="speaker">${speakerOptions(p.speaker)}</select></td>
		                    <td class="fr" data-label="法语"><div class="celltext" data-field="fr" contenteditable="true">${escapeHtml(p.fr || p.fr_raw || "")}</div></td>
		                    <td class="zh" data-label="中文"><div class="celltext" data-field="zh" contenteditable="true">${escapeHtml(p.zh || "")}</div></td>
		                  </tr>`;
		                }).join("");
                applyLanguageLabels(result, reviewTranscriptPane);
                currentReviewFilter = "all";
                reviewFilters.querySelectorAll(".review-filter").forEach(x => x.classList.toggle("active", x.dataset.filter === "all"));
                applyReviewFilter();
	              }
              setReviewMode("summary");
	              if (!result.review && (!result.paragraphs || !result.paragraphs.length)) {
                reviewEmpty.hidden = false;
              }
            } catch(e){}
	          });
	        });
        reviewHistoryList.querySelectorAll(".hist-edit").forEach(btn => {
          btn.addEventListener("click", async (e) => {
            e.stopPropagation();
            if (await editJobMeta(btn.dataset.id, btn.dataset.name, btn.dataset.note)) {
              loadHistory();
              loadReviewHistory();
            }
          });
        });
        // 删除按钮（评价页）
	        reviewHistoryList.querySelectorAll(".hist-del").forEach(btn => {
	          btn.addEventListener("click", async (e) => {
	            e.stopPropagation();
	            if (!await showConfirm("确定删除这条记录？\n此操作不可撤销。")) return;
	            const id = btn.dataset.id;
            try {
              await fetch(`/api/jobs/${id}`, { method: "DELETE" });
              loadReviewHistory();
              reviewText.hidden = true;
              reviewText.dataset.available = "0";
              reviewSummary.hidden = true;
              reviewPlayerBar.hidden = true;
              reviewAudioPlayer.removeAttribute("src");
              reviewAudioPlayer.load();
              reviewResultHeader.hidden = true;
              reviewTableWrap.hidden = true;
              reviewModeTabs.hidden = true;
              reviewTranscriptPane.hidden = true;
              reviewTranscriptPane.dataset.available = "0";
              clearAnnotationSelection();
              currentReviewResult = null;
              currentReviewJobId = null;
              reviewEmpty.hidden = false;
            } catch(e){}
          });
        });
	      } catch(e){}
	    }
		    loadReviewHistory();

		    /* ═══ 历史记录搜索筛选 ═══ */
		    function setupHistoryFilter(inputId, listId) {
		      const input = document.getElementById(inputId);
		      const list = document.getElementById(listId);
		      if (!input || !list) return;
		      input.addEventListener("input", () => {
		        const q = input.value.trim().toLowerCase();
		        list.querySelectorAll(".history-item").forEach(el => {
		          const name = el.querySelector(".h-name")?.textContent?.toLowerCase() || "";
		          el.hidden = q && !name.includes(q);
		        });
		      });
		    }
		    setupHistoryFilter("historySearch", "historyList");
		    setupHistoryFilter("reviewHistorySearch", "reviewHistoryList");

		    /* ═══ 键盘快捷键 ═══ */
	    document.addEventListener("keydown", (e) => {
	      // Ctrl+Enter / Meta+Enter → 开始转录
	      if ((e.ctrlKey || e.metaKey) && e.key === "Enter") {
	        // 不要在评价页的 textarea 里触发表单
	        if (document.activeElement?.closest(".review, #reviewText, .anno-popup textarea")) return;
	        if (!startBtn.disabled) form.requestSubmit();
	        return;
	      }
	      // Escape → 关闭标注弹窗 / 取消选中
	      if (e.key === "Escape") {
	        if (activePopup) {
	          activePopup.classList.remove("show");
	          activePopup = null;
	        }
	        clearAnnotationSelection();
	        return;
	      }
	      // Ctrl+S → 手动保存（触发视觉反馈）
	      if ((e.ctrlKey || e.metaKey) && e.key === "s") {
	        e.preventDefault();
	        setSaveStatus("saved");
	        return;
	      }
	      // F → 全屏切换
	      if (e.key === "f" && !e.ctrlKey && !e.metaKey && !e.altKey) {
	        if (!e.target.closest("input, select, textarea, [contenteditable]")) {
	          e.preventDefault();
	          if (!document.fullscreenElement) {
	            document.documentElement.requestFullscreen().catch(() => {});
	          } else {
	            document.exitFullscreen().catch(() => {});
	          }
	        }
	      }
	    });

	    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }
  </script>
</body>
</html>
